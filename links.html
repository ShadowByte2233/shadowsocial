<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Links</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --neon: #00c3ff;
      --neon2: #0077ff;
      --neon-dim: rgba(0, 195, 255, 0.15);
      --neon-glow: 0 0 8px #00c3ff, 0 0 20px #00c3ff, 0 0 40px #0077ff;
      --neon-glow-strong: 0 0 10px #00c3ff, 0 0 30px #00c3ff, 0 0 60px #0077ff, 0 0 100px #0044cc;
      --bg: #050810;
      --card: rgba(0, 15, 35, 0.6);
      --border: rgba(0, 195, 255, 0.25);
      --text: #e0f4ff;
      --text-muted: rgba(180, 220, 255, 0.5);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      overflow-x: hidden;
    }

    /* ── CANVAS BACKGROUND ── */
    #bg-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* ── GRID OVERLAY ── */
    .grid-overlay {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(0,195,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,195,255,0.03) 1px, transparent 1px);
      background-size: 50px 50px;
    }

    /* ── SCANLINES ── */
    .scanlines {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 0, 0, 0.07) 2px,
        rgba(0, 0, 0, 0.07) 4px
      );
    }

    /* ── MAIN LAYOUT ── */
    .container {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px 80px;
    }

    /* ── PROFILE SECTION ── */
    .profile {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      margin-bottom: 50px;
    }

    .avatar-wrapper {
      position: relative;
      width: 110px;
      height: 110px;
    }

    .avatar-ring {
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      border: 2px solid transparent;
      background: conic-gradient(from 0deg, var(--neon), var(--neon2), transparent, var(--neon)) border-box;
      -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: destination-out;
      mask-composite: exclude;
      animation: spin 4s linear infinite;
    }

    .avatar-ring-outer {
      position: absolute;
      inset: -14px;
      border-radius: 50%;
      border: 1px solid rgba(0,195,255,0.15);
      animation: spin 8s linear infinite reverse;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .avatar-glow {
      position: absolute;
      inset: -20px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,195,255,0.2) 0%, transparent 70%);
      animation: pulse-glow 2.5s ease-in-out infinite;
    }

    @keyframes pulse-glow {
      0%, 100% { opacity: 0.6; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.08); }
    }

    .avatar {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      position: relative;
      z-index: 2;
      /* Replace src with your profile image path */
    }

    .avatar-placeholder {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      background: linear-gradient(135deg, #001530, #002860);
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 38px;
      color: var(--neon);
      position: relative;
      z-index: 2;
      text-shadow: var(--neon-glow);
    }

    .username {
      font-family: 'Orbitron', monospace;
      font-size: 1.6rem;
      font-weight: 900;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #fff;
      text-shadow: var(--neon-glow);
      text-align: center;
    }

    .tagline {
      font-size: 0.95rem;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      text-align: center;
    }

    /* ── DIVIDER ── */
    .divider {
      width: 240px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--neon), transparent);
      margin-bottom: 44px;
      box-shadow: 0 0 12px var(--neon);
    }

    /* ── LINKS GRID ── */
    .links-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 100%;
      max-width: 480px;
    }

    /* ── SINGLE LINK BUTTON ── */
    .link-btn {
      position: relative;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 22px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      text-decoration: none;
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.05rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      overflow: hidden;
      transition: border-color 0.3s, transform 0.2s, box-shadow 0.3s;
      cursor: pointer;
      backdrop-filter: blur(10px);
    }

    /* Animated shimmer sweep */
    .link-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent 30%, rgba(0,195,255,0.07) 50%, transparent 70%);
      transform: translateX(-100%);
      transition: transform 0.5s ease;
    }

    .link-btn:hover::before { transform: translateX(100%); }

    /* Inner glow on hover */
    .link-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 10px;
      opacity: 0;
      background: radial-gradient(ellipse at center, rgba(0,195,255,0.08) 0%, transparent 70%);
      transition: opacity 0.3s;
    }

    .link-btn:hover::after { opacity: 1; }

    .link-btn:hover {
      border-color: var(--neon);
      box-shadow: 0 0 18px rgba(0,195,255,0.3), inset 0 0 20px rgba(0,195,255,0.05);
      transform: translateY(-2px) scale(1.01);
    }

    .link-btn:active { transform: translateY(0) scale(0.99); }

    /* Corner accent lines */
    .link-btn .corner {
      position: absolute;
      width: 10px;
      height: 10px;
      border-color: var(--neon);
      border-style: solid;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .link-btn:hover .corner { opacity: 1; }
    .corner.tl { top: 4px; left: 4px; border-width: 1px 0 0 1px; }
    .corner.tr { top: 4px; right: 4px; border-width: 1px 1px 0 0; }
    .corner.bl { bottom: 4px; left: 4px; border-width: 0 0 1px 1px; }
    .corner.br { bottom: 4px; right: 4px; border-width: 0 1px 1px 0; }

    /* Logo icon */
    .link-icon {
      width: 30px;
      height: 30px;
      object-fit: contain;
      flex-shrink: 0;
      filter: drop-shadow(0 0 4px var(--neon));
      transition: filter 0.3s;
    }
    .link-btn:hover .link-icon {
      filter: drop-shadow(0 0 8px var(--neon)) drop-shadow(0 0 16px var(--neon2));
    }

    /* Fallback emoji icon */
    .link-icon-emoji {
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
      filter: drop-shadow(0 0 4px var(--neon));
    }

    .link-label {
      flex: 1;
      position: relative;
      z-index: 1;
    }

    .link-arrow {
      font-size: 1rem;
      color: var(--neon);
      opacity: 0;
      transform: translateX(-6px);
      transition: opacity 0.3s, transform 0.3s;
      position: relative;
      z-index: 1;
      text-shadow: var(--neon-glow);
    }
    .link-btn:hover .link-arrow { opacity: 1; transform: translateX(0); }

    /* ── FOOTER ── */
    .footer {
      margin-top: 60px;
      font-size: 0.75rem;
      color: rgba(0,195,255,0.2);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-family: 'Orbitron', monospace;
    }

    /* ── CURSOR GLOW ── */
    .cursor-glow {
      position: fixed;
      pointer-events: none;
      z-index: 5;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,195,255,0.06) 0%, transparent 65%);
      transform: translate(-50%, -50%);
      transition: opacity 0.3s;
    }
  </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div class="grid-overlay"></div>
<div class="scanlines"></div>
<div class="cursor-glow" id="cursorGlow"></div>

<div class="container">

  <!-- PROFILE -->
  <div class="profile">
    <div class="avatar-wrapper">
      <div class="avatar-glow"></div>
      <div class="avatar-ring-outer"></div>
      <div class="avatar-ring"></div>
      <!--
        Ersetze das div unten durch:
        <img class="avatar" src="DEIN_BILD.png" alt="Profilbild" />
      -->
      <img class="avatar" src="pb.png" alt="Profilbild" />
    </div>

    <!-- Ersetze den Text mit deinem Namen -->
    <div class="username">SHADOWBYTE_2233</div>

    <!-- Optional: Kurze Bio / Tagline -->
    <div class="tagline">Content Creator · Gamer · Artist</div>
  </div>

  <div class="divider"></div>

  <!-- SOCIAL LINKS -->
  <div class="links-list" id="linksList">

    <!--
    ╔══════════════════════════════════════════════════════════╗
    ║  SO FÜGST DU DEINE LINKS EIN:                           ║
    ║                                                          ║
    ║  1. Ersetze href="DEIN_LINK" mit deiner echten URL      ║
    ║  2. Ersetze src="logo.png" mit deiner Logo-Datei        ║
    ║  3. Ersetze "Plattform Name" mit dem Namen              ║
    ║                                                          ║
    ║  Kopiere einfach einen <a>-Block für jeden Social!       ║
    ╚══════════════════════════════════════════════════════════╝
    -->

    <a class="link-btn" href="https://www.instagram.com/shadowbyte2233" target="_blank" rel="noopener">
      <span class="corner tl"></span><span class="corner tr"></span>
      <span class="corner bl"></span><span class="corner br"></span>
      <img class="link-icon" src="instagram.png" alt="Instagram" />
      <span class="link-label">Instagram</span>
      <span class="link-arrow">→</span>
    </a>

    <a class="link-btn" href="https://www.tiktok.com/@shadowbyte2233" target="_blank" rel="noopener">
      <span class="corner tl"></span><span class="corner tr"></span>
      <span class="corner bl"></span><span class="corner br"></span>
      <img class="link-icon" src="tiktok.png" alt="TikTok" />
      <span class="link-label">TikTok</span>
      <span class="link-arrow">→</span>
    </a>

    <a class="link-btn" href="https://www.youtube.com/@shadowbyte2233" target="_blank" rel="noopener">
      <span class="corner tl"></span><span class="corner tr"></span>
      <span class="corner bl"></span><span class="corner br"></span>
      <img class="link-icon" src="youtube.png" alt="YouTube" />
      <span class="link-label">YouTube</span>
      <span class="link-arrow">→</span>
    </a>

    <a class="link-btn" href="https://twitch.tv/shadowbyte2233" target="_blank" rel="noopener">
      <span class="corner tl"></span><span class="corner tr"></span>
      <span class="corner bl"></span><span class="corner br"></span>
      <img class="link-icon" src="twitch.png" alt="Twitch" />
      <span class="link-label">Twitch</span>
      <span class="link-arrow">→</span>
    </a>

    <a class="link-btn" href="https://discord.gg/22gbpjtxtw" target="_blank" rel="noopener">
      <span class="corner tl"></span><span class="corner tr"></span>
      <span class="corner bl"></span><span class="corner br"></span>
      <img class="link-icon" src="discord.png" alt="Discord" />
      <span class="link-label">Discord</span>
      <span class="link-arrow">→</span>
    </a>

    <a class="link-btn" href="https://open.spotify.com/user/31g46cbhwfeqxjlgdwgm4uy34cey" target="_blank" rel="noopener">
      <span class="corner tl"></span><span class="corner tr"></span>
      <span class="corner bl"></span><span class="corner br"></span>
      <img class="link-icon" src="spotify.png" alt="Spotify" />
      <span class="link-label">Spotify</span>
      <span class="link-arrow">→</span>
    </a>

  </div>

  <div class="footer">© 2026 · All Rights Reserved</div>
</div>

<script>
/* ══════════════════════════════════════
   MOUSE TRACKER + PARTICLE BACKGROUND
══════════════════════════════════════ */
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
const cursorGlow = document.getElementById('cursorGlow');

let W = window.innerWidth, H = window.innerHeight;
let mouse = { x: W / 2, y: H / 2 };
let mousePrev = { x: W / 2, y: H / 2 };

canvas.width = W;
canvas.height = H;

window.addEventListener('resize', () => {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W;
  canvas.height = H;
});

/* ── Cursor glow follow ── */
let targetX = W / 2, targetY = H / 2;
let currentX = W / 2, currentY = H / 2;

document.addEventListener('mousemove', (e) => {
  targetX = e.clientX;
  targetY = e.clientY;
  mouse.x = e.clientX;
  mouse.y = e.clientY;
});

/* ── Particles ── */
const PARTICLE_COUNT = 60;
const particles = [];

class Particle {
  constructor() { this.reset(true); }

  reset(initial = false) {
    this.x = Math.random() * W;
    this.y = initial ? Math.random() * H : H + 10;
    this.vx = (Math.random() - 0.5) * 0.4;
    this.vy = -(Math.random() * 0.5 + 0.2);
    this.size = Math.random() * 1.8 + 0.4;
    this.alpha = Math.random() * 0.6 + 0.1;
    this.life = 0;
    this.maxLife = Math.random() * 300 + 150;
    this.color = Math.random() > 0.3 ? '#00c3ff' : '#0077ff';
  }

  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.life++;
    if (this.life > this.maxLife || this.y < -10) this.reset();

    /* repel from mouse */
    const dx = this.x - mouse.x;
    const dy = this.y - mouse.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 120) {
      const force = (120 - dist) / 120;
      this.vx += (dx / dist) * force * 0.3;
      this.vy += (dy / dist) * force * 0.3;
    }

    this.vx *= 0.99;
    this.vy *= 0.99;
  }

  draw() {
    const fade = Math.min(this.life / 40, 1) * Math.min((this.maxLife - this.life) / 40, 1);
    ctx.save();
    ctx.globalAlpha = this.alpha * fade;
    ctx.shadowBlur = 8;
    ctx.shadowColor = this.color;
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

for (let i = 0; i < PARTICLE_COUNT; i++) particles.push(new Particle());

/* ── Mouse trail ── */
const trail = [];
const TRAIL_MAX = 24;

/* ── Mouse ripple ── */
const ripples = [];

document.addEventListener('mousemove', () => {
  trail.push({ x: mouse.x, y: mouse.y, life: 1 });
  if (trail.length > TRAIL_MAX) trail.shift();

  if (Math.random() > 0.92) {
    ripples.push({ x: mouse.x, y: mouse.y, r: 0, alpha: 0.5 });
  }
});

/* ── Main render loop ── */
function render() {
  ctx.clearRect(0, 0, W, H);

  /* subtle radial bg */
  const grad = ctx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, 400);
  grad.addColorStop(0, 'rgba(0,100,200,0.04)');
  grad.addColorStop(1, 'transparent');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  /* corner vignettes */
  ['top-left','top-right','bottom-left','bottom-right'].forEach((pos, i) => {
    const cx2 = i % 2 === 0 ? 0 : W;
    const cy2 = i < 2 ? 0 : H;
    const vg = ctx.createRadialGradient(cx2, cy2, 0, cx2, cy2, 350);
    vg.addColorStop(0, 'rgba(0,60,150,0.04)');
    vg.addColorStop(1, 'transparent');
    ctx.fillStyle = vg;
    ctx.fillRect(0, 0, W, H);
  });

  /* particles */
  particles.forEach(p => { p.update(); p.draw(); });

  /* connection lines between nearby particles */
  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const d = Math.sqrt(dx * dx + dy * dy);
      if (d < 100) {
        ctx.save();
        ctx.globalAlpha = (1 - d / 100) * 0.12;
        ctx.strokeStyle = '#00c3ff';
        ctx.lineWidth = 0.5;
        ctx.shadowBlur = 4;
        ctx.shadowColor = '#00c3ff';
        ctx.beginPath();
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.stroke();
        ctx.restore();
      }
    }
  }

  /* mouse trail */
  for (let i = 0; i < trail.length; i++) {
    const t = trail[i];
    const ratio = i / trail.length;
    ctx.save();
    ctx.globalAlpha = ratio * 0.25;
    ctx.shadowBlur = 10;
    ctx.shadowColor = '#00c3ff';
    ctx.fillStyle = '#00c3ff';
    ctx.beginPath();
    ctx.arc(t.x, t.y, ratio * 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  /* ripples */
  for (let i = ripples.length - 1; i >= 0; i--) {
    const rp = ripples[i];
    rp.r += 2.5;
    rp.alpha -= 0.018;
    if (rp.alpha <= 0) { ripples.splice(i, 1); continue; }
    ctx.save();
    ctx.globalAlpha = rp.alpha;
    ctx.strokeStyle = '#00c3ff';
    ctx.lineWidth = 0.8;
    ctx.shadowBlur = 12;
    ctx.shadowColor = '#00c3ff';
    ctx.beginPath();
    ctx.arc(rp.x, rp.y, rp.r, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }

  /* smooth cursor glow */
  currentX += (targetX - currentX) * 0.08;
  currentY += (targetY - currentY) * 0.08;
  cursorGlow.style.left = currentX + 'px';
  cursorGlow.style.top  = currentY + 'px';

  requestAnimationFrame(render);
}

render();

/* ── Entry animations ── */
document.querySelectorAll('.link-btn').forEach((btn, i) => {
  btn.style.opacity = '0';
  btn.style.transform = 'translateY(20px)';
  btn.style.transition = `opacity 0.5s ease ${0.1 + i * 0.08}s, transform 0.5s ease ${0.1 + i * 0.08}s, border-color 0.3s, box-shadow 0.3s`;
  setTimeout(() => {
    btn.style.opacity = '1';
    btn.style.transform = 'translateY(0)';
  }, 50);
});
</script>
</body>
</html>
